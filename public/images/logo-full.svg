<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 145">
  <defs>
    <radialGradient id="rfg" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff6e82"/>
      <stop offset="100%" stop-color="#c41040"/>
    </radialGradient>
    <radialGradient id="bfg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8898d8"/>
      <stop offset="100%" stop-color="#2432a0"/>
    </radialGradient>
    <linearGradient id="sfg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbbbbb"/>
      <stop offset="35%" stop-color="#f5f5f5"/>
      <stop offset="65%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
  </defs>
  <!-- Left red circle -->
  <circle cx="56" cy="60" r="46" fill="url(#rfg)"/>
  <!-- Right blue circle -->
  <circle cx="144" cy="60" r="46" fill="url(#bfg)"/>
  <!-- Silver N/heartbeat line -->
  <polyline
    points="16,66 64,54 88,18 112,104 136,52 184,48"
    fill="none"
    stroke="url(#sfg)"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- INTERNATIONAL text -->
  <text
    x="100"
    y="135"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="4"
    fill="#888888"
  >INTERNATIONAL</text>
</svg>
