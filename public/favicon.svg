<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Red sphere 3D gradient -->
    <radialGradient id="rg" cx="32%" cy="24%" r="72%">
      <stop offset="0%"   stop-color="#ff8888"/>
      <stop offset="8%"   stop-color="#ff3333"/>
      <stop offset="40%"  stop-color="#cc0000"/>
      <stop offset="78%"  stop-color="#880000"/>
      <stop offset="100%" stop-color="#3d0000"/>
    </radialGradient>
    <!-- Blue sphere 3D gradient -->
    <radialGradient id="bg" cx="32%" cy="24%" r="72%">
      <stop offset="0%"   stop-color="#7788ff"/>
      <stop offset="8%"   stop-color="#2244ee"/>
      <stop offset="40%"  stop-color="#0022bb"/>
      <stop offset="78%"  stop-color="#001188"/>
      <stop offset="100%" stop-color="#000844"/>
    </radialGradient>
    <!-- Chrome tube gradient -->
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#888888"/>
      <stop offset="28%"  stop-color="#e8e8e8"/>
      <stop offset="52%"  stop-color="#ffffff"/>
      <stop offset="72%"  stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#7a7a7a"/>
    </linearGradient>
    <!-- Specular highlight for spheres -->
    <radialGradient id="rs" cx="30%" cy="22%" r="40%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#000000"/>

  <!-- Left red sphere -->
  <circle cx="115" cy="198" r="97" fill="url(#rg)"/>
  <circle cx="115" cy="198" r="97" fill="url(#rs)"/>

  <!-- Right blue sphere -->
  <circle cx="285" cy="198" r="97" fill="url(#bg)"/>
  <circle cx="285" cy="198" r="97" fill="url(#rs)"/>

  <!-- Chrome N connector (smooth bezier through both spheres) -->
  <path
    d="M 25,232
       C 65,228 92,220 128,205
       C 150,195 165,162 178,118
       L 200,48
       C 208,80 218,135 228,190
       C 236,235 244,278 250,305
       C 260,268 272,228 292,205
       C 310,183 338,178 375,172"
    fill="none"
    stroke="url(#cg)"
    stroke-width="23"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
