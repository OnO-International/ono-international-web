<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="rg" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff6e82"/>
      <stop offset="100%" stop-color="#c41040"/>
    </radialGradient>
    <radialGradient id="bg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8898d8"/>
      <stop offset="100%" stop-color="#2432a0"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbbbbb"/>
      <stop offset="35%" stop-color="#f5f5f5"/>
      <stop offset="65%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
  </defs>
  <!-- Left red circle -->
  <circle cx="28" cy="50" r="23" fill="url(#rg)"/>
  <!-- Right blue circle -->
  <circle cx="72" cy="50" r="23" fill="url(#bg)"/>
  <!-- Silver N/heartbeat line going through both circles -->
  <polyline
    points="8,53 32,45 44,15 56,85 68,45 92,42"
    fill="none"
    stroke="url(#sg)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
