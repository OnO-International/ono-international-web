backend:
  name: github
  repo: OnO-International/ono-international-web
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: ja

collections:
  - name: "blog"
    label: "News & Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "概要・説明", name: "description", widget: "text" }
      - { label: "公開日", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: "カテゴリ"
        name: "category"
        widget: "select"
        options: ["NEWS", "BLOG", "AI", "VIDEO", "FREEDIVING", "UNDERWATER"]
        default: "NEWS"
      - { label: "サムネイル画像", name: "thumbnail", widget: "image", required: false }
      - { label: "下書き", name: "draft", widget: "boolean", default: false }
      - { label: "本文", name: "body", widget: "markdown" }
